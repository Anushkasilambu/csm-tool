<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KNOW Jira Fetcher</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f8fa; color: #1a1d2b; padding: 32px; max-width: 640px; }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.sub { font-size: 13px; color: #8c91a0; margin-bottom: 28px; }
.card { background: white; border: 1px solid #d8dae0; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
label { display: block; font-size: 12px; font-weight: 600; color: #454a58; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
input { width: 100%; padding: 10px 12px; border: 1px solid #d8dae0; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
input:focus { outline: none; border-color: #00c4b0; }
.buttons { display: flex; gap: 10px; margin-top: 4px; flex-wrap: wrap; }
button { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-green { background: #00c4b0; color: white; }
.btn-gray  { background: #454a58; color: white; }
.btn-purple { background: #7b61ff; color: white; }
.btn-orange { background: #f8a221; color: white; }
.status { margin-top: 14px; font-size: 13px; padding: 10px 14px; border-radius: 8px; }
.info    { background: #e6faf8; color: #007a70; border: 1px solid #00c4b0; }
.success { background: #e6fff4; color: #007a40; border: 1px solid #00c070; }
.error   { background: #fff0f0; color: #c00; border: 1px solid #f95757; }
#output-section { display: none; margin-top: 20px; }
textarea { width: 100%; height: 260px; padding: 12px; border: 1px solid #d8dae0; border-radius: 8px; font-size: 12px; font-family: monospace; background: #f7f8fa; resize: vertical; margin-bottom: 12px; }
.warning { background: #fff8e6; border: 1px solid #f8a221; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #7a5500; margin-bottom: 20px; }
.hint { font-size: 12px; color: #8c91a0; margin-top: -12px; margin-bottom: 16px; }
</style>
</head>
<body>

<h1>KNOW — Jira Fetcher</h1>
<p class="sub">Fetches KNL1 tickets and exports JSON for the CS Dashboard</p>

<div class="warning">⚠ Keep this file private — it contains your API token.</div>

<div class="card">
  <label>Your Atlassian Email</label>
  <input type="email" id="email" placeholder="you@example.com" />

  <label>API Token</label>
  <input type="password" id="token" placeholder="Paste your Jira API token" />

  <label>Project Key</label>
  <input type="text" id="project-key" value="KNL1" />
  <p class="hint">The letters before the dash in ticket numbers — e.g. if tickets are CS-123 it's CS</p>

  <div class="buttons">
    <button class="btn-green"  onclick="fetchTickets()">Fetch Tickets</button>
    <button class="btn-orange" onclick="runDiagnostic()">🔍 Diagnose</button>
    <button class="btn-gray"   onclick="testAuth()">Test Auth</button>
  </div>

  <div id="status" class="status info" style="display:none"></div>
</div>

<div id="output-section" class="card">
  <label>Output</label>
  <textarea id="output" readonly></textarea>
  <div class="buttons">
    <button class="btn-purple" onclick="copyOutput()">Copy to Clipboard</button>
    <button class="btn-gray"   onclick="downloadOutput()">Download JSON</button>
    <span id="copy-msg" style="font-size:13px;color:#00c070;display:none;margin-left:8px">✓ Copied!</span>
  </div>
</div>

<script>
var DOMAIN = 'knops.atlassian.net';
var CLIENT_FIELD_NAME = 'Client Name';

var STATUS_MAP = {
  'to do': 'open', 'open': 'open', 'new': 'open', 'reopened': 'open',
  'in progress': 'inProgress', 'in review': 'inProgress',
  'on hold': 'onHold', 'blocked': 'onHold', 'waiting': 'onHold',
  'done': 'resolved', 'resolved': 'resolved', 'closed': 'resolved'
};

function mapStatus(name) {
  var key = (name || '').toLowerCase();
  for (var k in STATUS_MAP) {
    if (key.indexOf(k) !== -1) return STATUS_MAP[k];
  }
  return 'open';
}

function getAuth() {
  return {
    email:  document.getElementById('email').value.trim(),
    token:  document.getElementById('token').value.trim(),
    header: 'Basic ' + btoa(unescape(encodeURIComponent(document.getElementById('email').value.trim() + ':' + document.getElementById('token').value.trim())))
  };
}

function getProject() {
  return document.getElementById('project-key').value.trim().toUpperCase();
}

function setStatus(msg, type) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (type || 'info');
  el.style.display = 'block';
}

function showOutput(text) {
  document.getElementById('output').value = text;
  document.getElementById('output-section').style.display = 'block';
}

function copyOutput() {
  var ta = document.getElementById('output');
  ta.select();
  document.execCommand('copy');
  var msg = document.getElementById('copy-msg');
  msg.style.display = 'inline';
  setTimeout(function() { msg.style.display = 'none'; }, 2000);
}

function downloadOutput() {
  var content = document.getElementById('output').value;
  var blob = new Blob([content], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'jira-tickets-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

// ── Safe fetch (handles non-JSON responses) ──────────────────────────────────
async function safeFetch(url, headers) {
  var res = await fetch(url, { headers: headers });
  var text = await res.text();
  try {
    return { ok: res.ok, status: res.status, data: JSON.parse(text), raw: text };
  } catch(e) {
    return { ok: res.ok, status: res.status, data: null, raw: text };
  }
}

// ── Test Auth ─────────────────────────────────────────────────────────────────
async function testAuth() {
  var auth = getAuth();
  if (!auth.email || !auth.token) { setStatus('Enter email and token first.', 'error'); return; }

  setStatus('Testing authentication…', 'info');
  try {
    var r = await safeFetch('https://' + DOMAIN + '/rest/api/3/myself', {
      'Authorization': auth.header, 'Accept': 'application/json'
    });
    if (r.data && r.data.accountId) {
      setStatus('✓ Auth OK — logged in as ' + (r.data.displayName || r.data.emailAddress), 'success');
      showOutput(JSON.stringify(r.data, null, 2));
    } else {
      setStatus('Auth failed (HTTP ' + r.status + ') — see output for details.', 'error');
      showOutput('HTTP ' + r.status + '\nRaw response:\n' + r.raw);
    }
  } catch(e) {
    setStatus('Network error: ' + e.message, 'error');
    showOutput('This usually means CORS is blocking the request.\nMake sure you opened Chrome with --disable-web-security.');
  }
}

// ── Diagnostic ────────────────────────────────────────────────────────────────
async function runDiagnostic() {
  var auth = getAuth();
  var project = getProject();
  if (!auth.email || !auth.token) { setStatus('Enter email and token first.', 'error'); return; }

  var headers = { 'Authorization': auth.header, 'Accept': 'application/json' };
  var report = '';
  setStatus('Running diagnostic…', 'info');

  try {
    // 1. Verify auth
    var meR = await safeFetch('https://' + DOMAIN + '/rest/api/3/myself', headers);
    if (!meR.data || !meR.data.accountId) { throw new Error('Auth failed (HTTP ' + meR.status + '): ' + meR.raw.slice(0, 200)); }
    var me = meR.data;
    report += '=== AUTH ===\n';
    report += (me.accountId ? '✓ Logged in as: ' + me.displayName + ' (' + me.emailAddress + ')' : '✗ Auth failed: ' + JSON.stringify(me)) + '\n\n';

    // 2. Projects
    var projR = await safeFetch('https://' + DOMAIN + '/rest/api/3/project', headers);
    var projects = projR.data || [];
    report += '=== PROJECTS ===\n';
    if (Array.isArray(projects) && projects.length) {
      projects.forEach(function(p) { report += p.key + ' — ' + p.name + '\n'; });
    } else {
      report += 'None returned. Response: ' + JSON.stringify(projects) + '\n';
    }
    report += '\n';

    // 3. Test project with bounded JQL
    var jql = encodeURIComponent('project = ' + project + ' ORDER BY created DESC');
    var url = 'https://' + DOMAIN + '/rest/api/3/search/jql?jql=' + jql + '&maxResults=3';
    var srR = await safeFetch(url, headers);
    var sr = srR.data || {};
    report += '=== PROJECT ' + project + ' ===\n';
    if (sr.total !== undefined) {
      report += 'Total tickets: ' + sr.total + '\n';
      if (sr.issues && sr.issues.length) {
        report += 'Sample ticket: ' + sr.issues[0].key + ' — ' + sr.issues[0].fields.summary + '\n';
        report += 'Status: ' + sr.issues[0].fields.status.name + '\n';
        report += 'Labels: ' + JSON.stringify(sr.issues[0].fields.labels) + '\n';
        // show non-null custom fields
        var cf = Object.entries(sr.issues[0].fields)
          .filter(function(e){ return e[0].startsWith('customfield_') && e[1] !== null; })
          .map(function(e){ return '  ' + e[0] + ': ' + JSON.stringify(e[1]); }).join('\n');
        if (cf) report += 'Custom fields with values:\n' + cf + '\n';
      }
    } else {
      report += 'Error: ' + JSON.stringify(sr) + '\n';
    }

    // 4. Find Client Name field
    var fieldsR = await safeFetch('https://' + DOMAIN + '/rest/api/3/field', headers);
    var allFields = fieldsR.data || [];
    report += '\n=== FIELD SEARCH: "' + CLIENT_FIELD_NAME + '" ===\n';
    if (Array.isArray(allFields)) {
      var matches = allFields.filter(function(f){ return f.name.toLowerCase().indexOf('client') !== -1; });
      if (matches.length) {
        matches.forEach(function(f){ report += f.id + ' — ' + f.name + '\n'; });
      } else {
        report += 'No fields with "client" in the name found.\n';
        report += 'All custom fields:\n';
        allFields.filter(function(f){ return f.custom; })
          .forEach(function(f){ report += '  ' + f.id + ' — ' + f.name + '\n'; });
      }
    }

    showOutput(report);
    setStatus('Diagnostic complete — share this output to fix the config.', 'success');
  } catch(e) {
    showOutput(report + '\nFATAL: ' + e.message);
    setStatus('Error: ' + e.message, 'error');
  }
}

// ── Fetch Tickets ─────────────────────────────────────────────────────────────
async function fetchTickets() {
  var auth = getAuth();
  var project = getProject();
  if (!auth.email || !auth.token) { setStatus('Enter email and token first.', 'error'); return; }

  document.querySelector('.btn-green').disabled = true;
  document.querySelector('.btn-green').textContent = 'Fetching…';
  document.getElementById('output-section').style.display = 'none';

  var headers = { 'Authorization': auth.header, 'Accept': 'application/json' };

  try {
    // Find client field
    setStatus('Looking up fields…', 'info');
    var clientFieldKey = null;
    var fieldsR = await safeFetch('https://' + DOMAIN + '/rest/api/3/field', headers);
    var allFields = fieldsR.data || [];
    if (Array.isArray(allFields)) {
      var fm = allFields.find(function(f){ return f.name.toLowerCase() === CLIENT_FIELD_NAME.toLowerCase(); });
      if (fm) clientFieldKey = fm.id;
    }

    var fieldParam = 'summary,status,assignee,priority,created,updated,labels,components' + (clientFieldKey ? ',' + clientFieldKey : '');

    var allIssues = [];
    var startAt = 0;
    var total = null;

    while (total === null || startAt < total) {
      setStatus('Fetching tickets ' + (startAt + 1) + '…', 'info');
      var jql = encodeURIComponent('project = ' + project + ' ORDER BY updated DESC');
      var url = 'https://' + DOMAIN + '/rest/api/3/search/jql?jql=' + jql + '&startAt=' + startAt + '&maxResults=50&fields=' + fieldParam;
      var fetchR = await safeFetch(url, headers);
      var data = fetchR.data || {};

      if (data.errorMessages && data.errorMessages.length) throw new Error(data.errorMessages.join(', '));

      total = data.total;
      allIssues = allIssues.concat(data.issues || []);
      startAt += (data.issues || []).length;
      if (!data.issues || data.issues.length === 0 || allIssues.length >= 500) break;
    }

    setStatus('Processing ' + allIssues.length + ' tickets…', 'info');

    var byClient = {};
    allIssues.forEach(function(issue) {
      var f = issue.fields;
      var clientName = null;
      if (clientFieldKey && f[clientFieldKey]) {
        var cf = f[clientFieldKey];
        clientName = typeof cf === 'string' ? cf : (cf.value || cf.name || null);
      }
      if (!clientName && f.labels && f.labels.length) clientName = f.labels[0];
      if (!clientName && f.components && f.components.length) clientName = f.components[0].name;
      if (!clientName) clientName = '__unassigned__';

      if (!byClient[clientName]) byClient[clientName] = { open: 0, inProgress: 0, resolved: 0, onHold: 0, tickets: [] };
      var cat = mapStatus(f.status ? f.status.name : '');
      byClient[clientName][cat]++;
      byClient[clientName].tickets.push({
        key:      issue.key,
        summary:  f.summary || '',
        status:   f.status ? f.status.name : '',
        priority: f.priority ? f.priority.name : '',
        assignee: f.assignee ? f.assignee.displayName : '',
        created:  (f.created || '').slice(0, 10),
        updated:  (f.updated || '').slice(0, 10)
      });
    });

    var unassigned = byClient['__unassigned__'] ? byClient['__unassigned__'].tickets.length : 0;
    delete byClient['__unassigned__'];

    var output = {
      fetchedAt: new Date().toISOString(),
      project: project,
      totalTickets: allIssues.length,
      unassigned: unassigned,
      clientField: clientFieldKey || 'not found — fell back to labels',
      jira: byClient
    };

    showOutput(JSON.stringify(output, null, 2));
    setStatus('✓ ' + allIssues.length + ' tickets across ' + Object.keys(byClient).length + ' clients' + (unassigned ? ' (' + unassigned + ' unassigned)' : ''), 'success');

  } catch(e) {
    setStatus('Error: ' + e.message, 'error');
  } finally {
    document.querySelector('.btn-green').disabled = false;
    document.querySelector('.btn-green').textContent = 'Fetch Tickets';
  }
}
</script>
</body>
</html>
